<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro MVP</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Financeiro MVP</h1>
    <p>Controle financeiro simplificado</p>
  </header>

  <main>

    <section class="cards">

      <div class="card">
        <h3>Saldo Atual</h3>
        <p id="current-balance">R$ 0,00</p>
      </div>

      <div class="card">
        <h3>Entradas</h3>
        <p id="total-income">R$ 0,00</p>
      </div>

      <div class="card">
        <h3>Saídas</h3>
        <p id="total-expense">R$ 0,00</p>
      </div>

      <div class="card">
        <h3>Contas a Vencer</h3>
        <p id="upcoming-bills">0</p>
      </div>

      <div class="card">
        <h3>Contas Vencidas</h3>
        <p id="overdue-bills">0</p>
      </div>

    </section>

    <section class="formulario">
      <h2>Nova Categoria</h2>

      <div class="category-manager">
        <input
          id="new-category"
          type="text"
          placeholder="Nome da nova categoria"
        >

        <button id="add-category-button" type="button">
          Adicionar Categoria
        </button>
      </div>
    </section>
    <section class="formulario">

      <h2>Novo Lançamento</h2>

      <form id="transaction-form">

  <select id="type" required>
    <option value="entrada">Entrada</option>
    <option value="saida">Saída</option>
  </select>

  <input
    id="description"
    type="text"
    placeholder="Descrição"
    required
  >

  <select id="category" required>

    <option value="">
      Selecione uma categoria
    </option>

  </select>

  <input
    id="amount"
    type="number"
    placeholder="Valor"
    step="0.01"
    min="0"
    required
  >

  <input
    id="date"
    type="date"
    required
  >

  <input
    id="due-date"
    type="date"
    required
  >

  <select id="status" required>
    <option value="pendente">Pendente</option>
    <option value="pago">Pago</option>
    <option value="recebido">Recebido</option>
  </select>

  <button id="submit-button" type="submit">
  Adicionar lançamento
</button>

<button id="cancel-edit-button" type="button" class="secondary-button hidden">
  Cancelar edição
</button>

    </section>

    <section class="tabela">

      <h2>Lançamentos</h2>
      <div class="filters">

        <select id="filter-type">

        <option value="all">
          Todos
        </option>

        <option value="entrada">
          Entradas
        </option>

        <option value="saida">
          Saídas
        </option>

        </select>

      </div>

      <table>

        <thead>
          <tr>
            <th>Tipo</th>
            <th>Descrição</th>
            <th>Categoria</th>
            <th>Valor</th>
            <th>Vencimento</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody id="transactions-table-body">
        </tbody>

      </table>

    </section>

  </main>

  <script src="app.js"></script>

</body>
</html>
